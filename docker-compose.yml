services:
  postgres:
    image: postgres:16-alpine
    container_name: yogev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yogev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yogev_password}
      POSTGRES_DB: yogev_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yogev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yogev -d yogev_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yogev-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://yogev:${POSTGRES_PASSWORD:-yogev_password}@postgres:5432/yogev_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRATION: 12h
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      GMAIL_SENDER_EMAIL: ${GMAIL_SENDER_EMAIL}
      APP_PORT: 3001
      APP_URL: ${APP_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
      SEED_DATABASE: ${SEED_DATABASE:-false}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yogev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: yogev-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - yogev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: yogev-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - yogev-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  yogev-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
