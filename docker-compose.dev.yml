services:
  postgres:
    image: postgres:16
    container_name: yogev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yogev
      POSTGRES_PASSWORD: yogev_password
      POSTGRES_DB: yogev_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yogev -d yogev_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
